<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Cup Trivia</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
<style>
:root {
  --bg:        #0d1117;
  --bg2:       #111a2e;
  --surface:   #1a2340;
  --surface2:  #1f2b4a;
  --line:      rgba(255,255,255,0.08);
  --line2:     rgba(255,255,255,0.16);
  --text:      #ffffff;
  --text-dim:  rgba(255,255,255,0.58);
  --text-faint:rgba(255,255,255,0.32);
  --acc:       #c8ff00;
  --acc-dark:  #9fc900;
  --acc-glow:  rgba(200,255,0,0.20);
  --teal:      #00d4b4;
  --good:      #22c55e;
  --bad:       #ef4444;
  --font-d: 'Barlow Condensed', 'Arial Narrow', sans-serif;
  --font-u: 'Inter', system-ui, sans-serif;
  --sidebar-w: 300px;
  --r: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100vw; height: 100vh; overflow: hidden;
  background: #000; color: var(--text);
  font-family: var(--font-u); font-size: 18px;
  -webkit-font-smoothing: antialiased;
}

/* Fixed 1920×1080 stage, scaled by App to fit the window (letterboxed) */
#root {
  width: 1920px; height: 1080px; display: flex;
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  background: var(--bg); overflow: hidden;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input { font-family: inherit; }

/* ---------- Typography helpers ---------- */
.display   { font-family: var(--font-d); font-weight: 800; line-height: 0.88; text-transform: uppercase; letter-spacing: -1px; }
.h2        { font-family: var(--font-d); font-weight: 700; }
.kicker    { font-family: var(--font-d); font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); font-size: 20px; }
.mono-num  { font-family: var(--font-d); font-weight: 700; font-variant-numeric: tabular-nums; }

/* ---------- Sidebar ---------- */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: linear-gradient(180deg, var(--surface) 0%, #151d36 100%);
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column; padding: 30px 24px; gap: 26px;
}
.side-brand { font-family: var(--font-d); font-weight: 800; font-size: 32px; text-transform: uppercase; letter-spacing: 1px; line-height: 1; }
.side-brand .dot { color: var(--acc); }
.side-brand .sub { display: block; font-size: 16px; font-weight: 600; letter-spacing: 3px; color: var(--text-dim); margin-top: 6px; }

.rail { display: flex; flex-direction: column; gap: 2px; }
.rail-title { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-faint); margin-bottom: 10px; font-weight: 700; }
.rail-step { display: flex; align-items: center; gap: 12px; padding: 6px 0; opacity: 0.5; transition: opacity .3s; }
.rail-step.active { opacity: 1; }
.rail-step.done { opacity: 0.75; }
.rail-bullet { width: 12px; height: 12px; border-radius: 50%; background: var(--text-faint); flex-shrink: 0; }
.rail-step.active .rail-bullet { background: var(--acc); box-shadow: 0 0 0 5px var(--acc-glow); }
.rail-step.done .rail-bullet { background: var(--teal); }
.rail-yr { font-family: var(--font-d); font-weight: 600; font-size: 19px; }
.rail-pos { margin-left: auto; font-size: 13px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

.mgr-list { display: flex; flex-direction: column; gap: 10px; margin-top: auto; }
.mgr-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid transparent; transition: all .25s; }
.mgr-row.current { background: var(--acc-glow); border-color: var(--acc); }
.avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--surface2); color: var(--text); display: flex; align-items: center; justify-content: center; font-family: var(--font-d); font-weight: 700; font-size: 20px; flex-shrink: 0; }
.mgr-row.current .avatar { background: var(--acc); color: #0d1117; animation: pulse-ring 1.6s infinite; }
.mgr-meta { display: flex; flex-direction: column; line-height: 1.1; min-width: 0; }
.mgr-name { font-weight: 600; font-size: 17px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mgr-sub { font-size: 13px; color: var(--text-dim); }
.mgr-score { margin-left: auto; font-family: var(--font-d); font-weight: 700; font-size: 24px; font-variant-numeric: tabular-nums; }
.mgr-crown { font-size: 15px; margin-left: 4px; }

/* ---------- Main ---------- */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
.main::before { content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.45)),
    radial-gradient(900px 600px at 15% -10%, rgba(200,255,0,.04), transparent 70%),
    radial-gradient(900px 600px at 90% 110%, rgba(0,212,180,.04), transparent 70%);
}

.scene { flex: 1; display: flex; flex-direction: column; padding: 40px 48px; animation: scene-in .4s ease both; min-height: 0; position: relative; z-index: 1; }
.scene-full { padding: 0; align-items: center; justify-content: center; }

/* ---------- Buttons ---------- */
.btn { font-family: var(--font-d); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border-radius: 12px; padding: 16px 32px; font-size: 24px; transition: transform .12s, box-shadow .2s, background .2s; }
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--acc); color: #0d1117; }
.btn-primary:hover { box-shadow: 0 8px 30px var(--acc-glow); transform: translateY(-2px); }
.btn-primary:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-ghost { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid var(--line2); text-decoration: none; display: inline-block; }
.btn-ghost:hover { background: rgba(255,255,255,0.12); }
.btn-lg { font-size: 30px; padding: 22px 48px; }

/* ---------- Setup ---------- */
.setup-wrap { display: flex; gap: 80px; align-items: center; max-width: 1400px; width: 100%; }
.home-link { position: absolute; top: 30px; left: 40px; z-index: 5; font-family: var(--font-d); font-weight: 600; font-size: 21px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); text-decoration: none; transition: color .2s; }
.home-link:hover { color: var(--acc); }
.setup-left { flex: 1; }
.setup-left .display { font-size: 110px; }
.setup-left .tagline { color: var(--text-dim); font-size: 26px; margin-top: 14px; }
.cat-strip { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 32px; max-width: 620px; }
.cat-pill { background: var(--surface); border: 1px solid var(--line); border-radius: 999px; padding: 8px 16px; font-family: var(--font-d); font-weight: 600; font-size: 17px; letter-spacing: 1px; text-transform: uppercase; display: flex; gap: 8px; align-items: center; }
.cat-pill .n { color: var(--acc); }
.setup-right { width: 460px; background: var(--surface); border: 1px solid var(--line); border-radius: 20px; padding: 36px; }
.setup-right h3 { font-family: var(--font-d); font-weight: 700; font-size: 28px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 18px; }
.mgr-input-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.mgr-input-row input { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid var(--line2); border-radius: 10px; padding: 12px 16px; color: var(--text); font-size: 19px; outline: none; transition: border-color .2s; min-width: 0; }
.mgr-input-row input:focus { border-color: var(--acc); }
.mgr-input-row .rm { color: var(--text-faint); font-size: 26px; padding: 0 6px; }
.mgr-input-row .rm:hover { color: var(--bad); }
.add-mgr { color: var(--teal); font-weight: 600; font-size: 17px; padding: 8px 0; }
.add-mgr:hover { text-decoration: underline; }
.len-row { display: flex; gap: 10px; margin-top: 8px; }
.len-opt { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--line2); border-radius: 12px; padding: 12px 8px; text-align: center; transition: all .2s; }
.len-opt:hover { border-color: var(--acc); }
.len-opt.sel { background: var(--acc-glow); border-color: var(--acc); }
.len-opt .n { font-family: var(--font-d); font-weight: 800; font-size: 32px; line-height: 1; }
.len-opt .lbl { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
.setup-label { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-faint); font-weight: 700; margin: 22px 0 10px; }

/* ---------- Question scene ---------- */
.quiz-head { display: flex; align-items: center; gap: 14px; }
.q-counter { font-family: var(--font-d); font-weight: 700; font-size: 26px; color: var(--text-dim); }
.chip { font-family: var(--font-d); font-weight: 700; font-size: 17px; letter-spacing: 1.5px; text-transform: uppercase; border-radius: 999px; padding: 6px 16px; border: 1px solid var(--line2); color: var(--text-dim); }
.chip.cat { color: var(--teal); border-color: rgba(0,212,180,0.4); }
.chip.diff-easy   { color: var(--good); border-color: rgba(34,197,94,0.4); }
.chip.diff-medium { color: var(--acc);  border-color: rgba(200,255,0,0.4); }
.chip.diff-hard   { color: var(--bad);  border-color: rgba(239,68,68,0.4); }

.timer-wrap { margin-left: auto; display: flex; align-items: center; gap: 16px; }
.timer-num { font-family: var(--font-d); font-weight: 800; font-size: 46px; font-variant-numeric: tabular-nums; min-width: 64px; text-align: right; }
.timer-num.low { color: var(--bad); animation: tick-pulse .5s infinite; }
.timebar { width: 260px; height: 10px; border-radius: 999px; background: rgba(255,255,255,0.08); overflow: hidden; }
.timebar-fill { height: 100%; border-radius: 999px; background: var(--acc); transition: width .12s linear; }
.timebar-fill.low { background: var(--bad); }
.timebar-fill.frozen { background: var(--text-faint); }

.on-clock { display: flex; align-items: center; gap: 16px; margin-top: 26px; }
.on-clock .avatar { width: 52px; height: 52px; font-size: 26px; background: var(--acc); color: #0d1117; animation: pulse-ring 1.6s infinite; }
.on-clock .who { font-family: var(--font-d); font-weight: 800; font-size: 34px; text-transform: uppercase; line-height: 1; }
.on-clock .lbl { font-size: 15px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); font-weight: 600; }

.q-text { font-family: var(--font-d); font-weight: 700; font-size: 58px; line-height: 1.05; margin-top: 34px; max-width: 1300px; text-wrap: balance; }

.opts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 44px; max-width: 1300px; }
.opt {
  display: flex; align-items: center; gap: 20px; text-align: left;
  background: linear-gradient(180deg, var(--surface) 0%, #161f3a 100%);
  border: 2px solid var(--line); border-radius: var(--r);
  padding: 24px 26px; transition: transform .15s, border-color .2s, background .2s, opacity .3s;
  animation: rise .45s ease both;
}
.opt:nth-child(2) { animation-delay: .06s; }
.opt:nth-child(3) { animation-delay: .12s; }
.opt:nth-child(4) { animation-delay: .18s; }
.opt:hover:not(:disabled) { transform: translateY(-4px); border-color: var(--acc); }
.opt:disabled { cursor: default; }
.opt-key { width: 46px; height: 46px; border-radius: 10px; flex-shrink: 0; background: rgba(255,255,255,0.06); border: 1px solid var(--line2); display: flex; align-items: center; justify-content: center; font-family: var(--font-d); font-weight: 700; font-size: 24px; color: var(--text-dim); transition: all .2s; }
.opt:hover:not(:disabled) .opt-key { background: var(--acc); color: #0d1117; border-color: var(--acc); }
.opt-text { font-family: var(--font-d); font-weight: 600; font-size: 32px; line-height: 1.05; }

.opt.picked { border-color: var(--acc); background: var(--acc-glow); }
.opt.picked .opt-key { background: var(--acc); color: #0d1117; border-color: var(--acc); }
.opt.dim { opacity: .35; }
.opt.correct { border-color: var(--good); background: rgba(34,197,94,0.14); animation: slot-pop .5s ease both; }
.opt.correct .opt-key { background: var(--good); color: #fff; border-color: var(--good); }
.opt.wrong { border-color: var(--bad); background: rgba(239,68,68,0.12); animation: shake .45s ease both; }
.opt.wrong .opt-key { background: var(--bad); color: #fff; border-color: var(--bad); }

.locked-note { margin-top: 30px; font-family: var(--font-d); font-weight: 700; font-size: 26px; letter-spacing: 4px; text-transform: uppercase; color: var(--text-dim); animation: chip-pulse 1s infinite; }

.verdict { margin-top: 26px; display: flex; align-items: baseline; gap: 22px; }
.verdict .stamp { font-family: var(--font-d); font-weight: 800; font-size: 64px; line-height: 1; text-transform: uppercase; letter-spacing: 1px; animation: stamp-slam .45s cubic-bezier(.2,1.4,.4,1) both; }
.verdict .stamp.good { color: var(--good); }
.verdict .stamp.bad { color: var(--bad); }
.verdict .pts { font-family: var(--font-d); font-weight: 800; font-size: 50px; color: var(--acc); animation: pop-in .5s ease both .25s; }
.fact { margin-top: 18px; max-width: 1100px; background: var(--surface); border-left: 4px solid var(--teal); border-radius: 0 12px 12px 0; padding: 18px 24px; font-size: 21px; line-height: 1.5; color: var(--text-dim); animation: rise .5s ease both .35s; }
.fact b { color: var(--text); }

.foot-hint { margin-top: auto; padding-top: 24px; color: var(--text-faint); font-size: 17px; }
.foot-hint kbd { font-family: var(--font-d); font-weight: 700; font-size: 16px; background: rgba(255,255,255,0.07); border: 1px solid var(--line2); border-radius: 6px; padding: 2px 9px; margin: 0 3px; color: var(--text-dim); }

/* ---------- Results ---------- */
.results-wrap { width: 100%; max-width: 1100px; display: flex; flex-direction: column; align-items: center; }
.ft-kicker { font-family: var(--font-d); font-weight: 600; font-size: 26px; letter-spacing: 8px; text-transform: uppercase; color: var(--teal); animation: rise .5s ease both; }
.champ { text-align: center; margin-top: 18px; animation: rise .5s ease both .1s; }
.champ .cup { font-size: 90px; display: block; animation: pop-in .6s ease both .3s; }
.champ .name { font-family: var(--font-d); font-weight: 800; font-size: 96px; line-height: .95; text-transform: uppercase; color: var(--acc); text-shadow: 0 0 60px var(--acc-glow); }
.champ .sub { color: var(--text-dim); font-size: 24px; margin-top: 10px; }
.standings { width: 100%; margin-top: 44px; display: flex; flex-direction: column; gap: 12px; }
.stand-row { display: flex; align-items: center; gap: 20px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); padding: 16px 26px; animation: rise .45s ease both; }
.stand-row.winner { border-color: var(--acc); background: linear-gradient(90deg, rgba(200,255,0,0.10), var(--surface) 60%); }
.stand-rank { font-family: var(--font-d); font-weight: 800; font-size: 38px; width: 54px; color: var(--text-dim); }
.stand-row.winner .stand-rank { color: var(--acc); }
.stand-name { font-family: var(--font-d); font-weight: 700; font-size: 34px; text-transform: uppercase; }
.stand-medal { font-size: 26px; }
.stand-score { margin-left: auto; font-family: var(--font-d); font-weight: 800; font-size: 42px; font-variant-numeric: tabular-nums; }
.results-btns { display: flex; gap: 16px; margin-top: 48px; animation: rise .5s ease both .4s; }

/* ---------- Background blobs ---------- */
.announce-bg { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.bg-blob { position: absolute; border-radius: 50%; filter: blur(120px); animation: bg-drift 22s ease-in-out infinite alternate; }
.bg-blob.a { width: 800px; height: 640px; left: -200px; top: -220px; background: rgba(200,255,0,0.06); }
.bg-blob.b { width: 800px; height: 640px; right: -200px; bottom: -220px; background: rgba(0,212,180,0.07); animation-delay: -11s; }

/* ---------- Animations ---------- */
@keyframes scene-in { from { opacity: 0; transform: translateY(14px) scale(.99); } to { opacity: 1; transform: none; } }
@keyframes rise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
@keyframes bg-drift { from { transform: translate(0, 0) scale(1); } to { transform: translate(120px, 60px) scale(1.15); } }
@keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 var(--acc-glow); } 70% { box-shadow: 0 0 0 12px rgba(200,255,0,0); } 100% { box-shadow: 0 0 0 0 rgba(200,255,0,0); } }
@keyframes pop-in { 0% { transform: scale(.5); opacity: 0; } 70% { transform: scale(1.12); } 100% { transform: scale(1); opacity: 1; } }
@keyframes slot-pop { 0% { transform: scale(.97); } 60% { transform: scale(1.025); box-shadow: 0 0 0 10px rgba(34,197,94,0.15); } 100% { transform: scale(1); } }
@keyframes shake { 0%, 100% { transform: none; } 20% { transform: translateX(-9px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(3px); } }
@keyframes stamp-slam { 0% { transform: scale(2.2) rotate(-3deg); opacity: 0; filter: blur(4px); } 60% { transform: scale(.94) rotate(0); opacity: 1; filter: blur(0); } 100% { transform: scale(1); } }
@keyframes chip-pulse { 50% { opacity: .45; } }
@keyframes tick-pulse { 50% { opacity: .5; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useReducer, useCallback } = React;

/* =========================================================================
   QUESTION BANK — World Cup history through 2022 (all data inlined)
   Format: q, a[0] is the correct answer (options shuffled at deal time),
   diff: easy|medium|hard, cat: category chip, fact: shown on reveal.
   ========================================================================= */
const QUESTIONS = [
  // ------------------------------ EASY ------------------------------
  { diff: 'easy', cat: 'Winners', q: 'Which country won the 2022 World Cup in Qatar?',
    a: ['Argentina', 'France', 'Brazil', 'Croatia'],
    fact: 'Argentina beat France on penalties after a 3–3 final for the ages — their third title.' },
  { diff: 'easy', cat: 'Winners', q: 'Which nation has won the most World Cups?',
    a: ['Brazil', 'Germany', 'Italy', 'Argentina'],
    fact: 'Brazil have five stars: 1958, 1962, 1970, 1994 and 2002.' },
  { diff: 'easy', cat: 'History', q: 'How often is the World Cup held?',
    a: ['Every 4 years', 'Every 2 years', 'Every 3 years', 'Every 5 years'],
    fact: 'Only the 1942 and 1946 editions were ever cancelled, due to World War II.' },
  { diff: 'easy', cat: 'Hosts', q: 'Which country hosted the 2022 World Cup?',
    a: ['Qatar', 'Russia', 'United Arab Emirates', 'Morocco'],
    fact: 'It was the first World Cup in the Middle East — and the first played in November and December.' },
  { diff: 'easy', cat: 'Awards', q: 'Who won the Golden Boot at the 2022 World Cup?',
    a: ['Kylian Mbappé', 'Lionel Messi', 'Olivier Giroud', 'Julián Álvarez'],
    fact: 'Mbappé scored 8, including a final hat-trick — the first in a final since Geoff Hurst in 1966.' },
  { diff: 'easy', cat: 'Hosts', q: 'Which three countries co-host the 2026 World Cup?',
    a: ['USA, Canada & Mexico', 'USA, Mexico & Brazil', 'Spain, Portugal & Morocco', 'Argentina, Uruguay & Paraguay'],
    fact: '2026 is the first 48-team World Cup, and Mexico becomes the first country to host three times.' },
  { diff: 'easy', cat: 'History', q: 'Which country won the first ever World Cup in 1930?',
    a: ['Uruguay', 'Argentina', 'Brazil', 'Italy'],
    fact: 'Uruguay hosted and won it, beating Argentina 4–2 in the final in Montevideo.' },
  { diff: 'easy', cat: 'Winners', q: 'Who beat Croatia 4–2 in the 2018 World Cup final?',
    a: ['France', 'Belgium', 'England', 'Germany'],
    fact: 'A 19-year-old Mbappé became the first teenager to score in a final since Pelé in 1958.' },
  { diff: 'easy', cat: 'Moments', q: 'The famous "Hand of God" goal was scored by which player?',
    a: ['Diego Maradona', 'Pelé', 'Zinedine Zidane', 'Romário'],
    fact: '1986 quarter-final vs England. Four minutes later Maradona scored the "Goal of the Century".' },
  { diff: 'easy', cat: 'Moments', q: 'Which host nation lost 7–1 to Germany in the 2014 semi-final?',
    a: ['Brazil', 'Argentina', 'Spain', 'Netherlands'],
    fact: 'The "Mineirazo" — Brazil’s heaviest World Cup defeat, suffered at home in Belo Horizonte.' },
  { diff: 'easy', cat: 'Winners', q: 'England’s only World Cup win came in which year?',
    a: ['1966', '1970', '1958', '1990'],
    fact: 'Geoff Hurst hit a hat-trick in the 4–2 final win over West Germany at Wembley.' },
  { diff: 'easy', cat: 'Legends', q: 'Who is the only player to win three World Cups?',
    a: ['Pelé', 'Diego Maradona', 'Franz Beckenbauer', 'Cafu'],
    fact: 'Pelé won in 1958 (aged 17), 1962 and 1970 with Brazil.' },
  { diff: 'easy', cat: 'Awards', q: 'Which award goes to the World Cup’s top goalscorer?',
    a: ['The Golden Boot', 'The Golden Ball', 'The Golden Glove', 'The Puskás Award'],
    fact: 'The Golden Ball goes to the best player and the Golden Glove to the best goalkeeper.' },
  { diff: 'easy', cat: 'Winners', q: 'Which country hosted AND won the 1998 World Cup?',
    a: ['France', 'Brazil', 'Italy', 'Spain'],
    fact: 'Zinedine Zidane headed two goals in the 3–0 final win over Brazil in Paris.' },
  { diff: 'easy', cat: 'Hosts', q: 'The 2010 World Cup in South Africa was the first held on which continent?',
    a: ['Africa', 'Asia', 'North America', 'Oceania'],
    fact: 'Remembered worldwide for one sound: the vuvuzela.' },

const CATS = [...new Set(QUESTIONS.map(q => q.cat))];
const DIFF_BASE = { easy: 100, medium: 150, hard: 200 };
const TIME_LIMIT = 25; // seconds on the clock per question
const SPEED_BONUS = 50; // max extra points for answering instantly

/* =========================================================================
   DECK BUILDING
   ========================================================================= */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Shuffle the four options, remembering where the correct one lands
function deal(q) {
  const opts = shuffle(q.a.map((text, i) => ({ text, correct: i === 0 })));
  return { q: q.q, cat: q.cat, diff: q.diff, fact: q.fact,
           opts: opts.map(o => o.text), correct: opts.findIndex(o => o.correct) };
}

// Difficulty ramps round by round: easy rounds first, then medium, then hard.
// Every player in a round gets a (different) question of the same difficulty,
// so nobody loses on the luck of the draw. Pools fall back when exhausted.
function buildDeck(nPlayers, perPlayer) {
  const nEasy = Math.ceil(perPlayer / 3);
  const nHard = Math.floor(perPlayer / 3);
  const rounds = [
    ...Array(nEasy).fill('easy'),
    ...Array(perPlayer - nEasy - nHard).fill('medium'),
    ...Array(nHard).fill('hard'),
  ];
  const pools = {
    easy:   shuffle(QUESTIONS.filter(q => q.diff === 'easy')),
    medium: shuffle(QUESTIONS.filter(q => q.diff === 'medium')),
    hard:   shuffle(QUESTIONS.filter(q => q.diff === 'hard')),
  };
  const deck = [];
  for (const want of rounds) {
    for (let p = 0; p < nPlayers; p++) {
      let raw = pools[want].pop();
      if (!raw) for (const alt of ['easy', 'medium', 'hard']) {
        if (pools[alt].length) { raw = pools[alt].pop(); break; }
      }
      deck.push(deal(raw));
    }
  }
  return deck;
}

/* =========================================================================
   STATE MACHINE
   ========================================================================= */
const initial = { state: 'SETUP', players: [], deck: [], perPlayer: 5, qIndex: 0 };

function reducer(s, a) {
  switch (a.type) {
    case 'START':
      return { ...s, state: 'QUIZ', perPlayer: a.perPlayer, qIndex: 0,
               players: a.names.map(name => ({ name, score: 0 })),
               deck: buildDeck(a.names.length, a.perPlayer) };
    case 'SCORE':
      return { ...s, players: s.players.map((p, i) =>
        i === a.player ? { ...p, score: p.score + a.points } : p) };
    case 'NEXT':
      return s.qIndex + 1 >= s.deck.length
        ? { ...s, state: 'RESULTS' }
        : { ...s, qIndex: s.qIndex + 1 };
    case 'RESTART': // same players, fresh deck
      return { ...s, state: 'QUIZ', qIndex: 0,
               players: s.players.map(p => ({ ...p, score: 0 })),
               deck: buildDeck(s.players.length, s.perPlayer) };
    case 'RESET':
      return initial;
    default:
      return s;
  }
}

/* =========================================================================
   HOOKS
   ========================================================================= */
function useKey(key, fn) {
  const ref = useRef(fn);
  ref.current = fn;
  useEffect(() => {
    const h = (e) => { if (e.key === key) { e.preventDefault(); ref.current(); } };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [key]);
}

function useCountUp(target, dur = 700) {
  const [v, setV] = useState(target);
  const prev = useRef(target);
  useEffect(() => {
    const from = prev.current;
    prev.current = target;
    if (from === target) return;
    let raf;
    const t0 = performance.now();
    const step = (t) => {
      const k = Math.min(1, (t - t0) / dur);
      setV(Math.round(from + (target - from) * (1 - Math.pow(1 - k, 3))));
      if (k < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [target]);
  return v;
}

// Scale the fixed 1920×1080 stage to fit the window (letterboxed on non-16:9)
function useStageScale() {
  useEffect(() => {
    const fit = () => {
      const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      document.getElementById('root').style.transform = `translate(-50%, -50%) scale(${s})`;
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);
}

/* =========================================================================
   QUESTION — live → locked (suspense beat) → reveal (staggered, house style)
   ========================================================================= */
function QuestionScreen({ state, dispatch }) {
  const { deck, qIndex, players } = state;
  const card = deck[qIndex];
  const playerIdx = qIndex % players.length;
  const player = players[playerIdx];

  const [phase, setPhase] = useState('live'); // live | locked | reveal
  const [picked, setPicked] = useState(null);
  const [timeLeft, setTimeLeft] = useState(TIME_LIMIT);
  const lockedAt = useRef(0);   // seconds remaining when the answer locked
  const phaseRef = useRef('live');
  phaseRef.current = phase;

  const correct = picked === card.correct;
  const points = correct
    ? DIFF_BASE[card.diff] + Math.round((lockedAt.current / TIME_LIMIT) * SPEED_BONUS)
    : 0;

  const lock = useCallback((i, secondsLeft) => {
    if (phaseRef.current !== 'live') return;
    lockedAt.current = secondsLeft;
    setPicked(i);
    setPhase('locked');
  }, []);

  // Countdown — runs only while live
  useEffect(() => {
    if (phase !== 'live') return;
    const deadline = performance.now() + TIME_LIMIT * 1000;
    const id = setInterval(() => {
      const left = Math.max(0, (deadline - performance.now()) / 1000);
      setTimeLeft(left);
      if (left <= 0) lock(null, 0);
    }, 100);
    return () => clearInterval(id);
  }, [phase, lock]);

  // Suspense beat between locking and the reveal slam
  useEffect(() => {
    if (phase !== 'locked') return;
    const t = setTimeout(() => setPhase('reveal'), 1100);
    return () => clearTimeout(t);
  }, [phase]);

  // Bank the points the moment the reveal lands (sidebar ticker animates)
  useEffect(() => {
    if (phase === 'reveal' && points > 0) {
      dispatch({ type: 'SCORE', player: playerIdx, points });
    }
  }, [phase]);

  // Keys 1–4 answer while live
  useEffect(() => {
    const h = (e) => {
      const n = parseInt(e.key, 10);
      if (n >= 1 && n <= 4 && phaseRef.current === 'live') lock(n - 1, timeLeft);
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [timeLeft, lock]);

  const next = () => { if (phaseRef.current === 'reveal') dispatch({ type: 'NEXT' }); };
  useKey(' ', next);
  useKey('Enter', next);

  const lastQuestion = qIndex + 1 >= deck.length;
  const low = phase === 'live' && timeLeft <= 5;
  const timedOut = picked === null;

  const optClass = (i) => {
    if (phase === 'locked') return i === picked ? ' picked' : ' dim';
    if (phase === 'reveal') {
      if (i === card.correct) return ' correct';
      if (i === picked) return ' wrong';
      return ' dim';
    }
    return '';
  };

  return (
    <div className="scene" onClick={next}>
      <div className="quiz-head">
        <div className="q-counter mono-num">Q{qIndex + 1}/{deck.length}</div>
        <div className="chip cat">{card.cat}</div>
        <div className={'chip diff-' + card.diff}>{card.diff}</div>
        <div className="timer-wrap">
          <div className="timebar">
            <div className={'timebar-fill' + (low ? ' low' : phase !== 'live' ? ' frozen' : '')}
                 style={{ width: ((phase === 'live' ? timeLeft : lockedAt.current) / TIME_LIMIT * 100) + '%' }} />
          </div>
          <div className={'timer-num' + (low ? ' low' : '')}>
            {Math.ceil(phase === 'live' ? timeLeft : lockedAt.current)}
          </div>
        </div>
      </div>

      <div className="on-clock">
        <div className="avatar">{player.name[0].toUpperCase()}</div>
        <div>
          <div className="lbl">On the clock</div>
          <div className="who">{player.name}</div>
        </div>
      </div>

      <div className="q-text">{card.q}</div>

      <div className="opts">
        {card.opts.map((text, i) => (
          <button key={i} className={'opt' + optClass(i)} disabled={phase !== 'live'}
                  onClick={(e) => { e.stopPropagation(); lock(i, timeLeft); }}>
            <div className="opt-key">{i + 1}</div>
            <div className="opt-text">{text}</div>
          </button>
        ))}
      </div>

      {phase === 'locked' && <div className="locked-note">Locked in…</div>}

      {phase === 'reveal' && (
        <>
          <div className="verdict">
            <div className={'stamp ' + (correct ? 'good' : 'bad')}>
              {correct ? 'Correct!' : timedOut ? 'Time’s up!' : 'Wrong!'}
            </div>
            {correct && <div className="pts mono-num">+{points}</div>}
          </div>
          <div className="fact"><b>Did you know?</b> {card.fact}</div>
        </>
      )}

      <div className="foot-hint">
        {phase === 'live' && <span>Press <kbd>1</kbd>–<kbd>4</kbd> or tap an answer · {DIFF_BASE[card.diff]} pts + up to {SPEED_BONUS} speed bonus</span>}
        {phase === 'reveal' && <span><kbd>Space</kbd> {lastQuestion ? 'Final standings' : 'Next question'}</span>}
      </div>
    </div>
  );
}

          <div className="name">{draw ? 'It’s a draw!' : ranked[0].name}</div>
          <div className="sub">
            {draw ? winners.map(w => w.name).join(' & ') + ' share the title on ' + top + ' points'
                  : 'World Cup Trivia Champion · ' + top + ' points'}
          </div>
        </div>
        <div className="standings">
          {ranked.map((p, i) => (
            <div key={p.name + i} className={'stand-row' + (p.score === top ? ' winner' : '')}
                 style={{ animationDelay: (0.15 + i * 0.1) + 's' }}>
              <div className="stand-rank mono-num">{i + 1}</div>
              <div className="stand-name">{p.name}</div>
              {i < 3 && <div className="stand-medal">{medals[i]}</div>}
              <div className="stand-score mono-num">{p.score}</div>
            </div>
          ))}
        </div>
        <div className="results-btns">
          <button className="btn btn-primary btn-lg" onClick={() => dispatch({ type: 'RESTART' })}>Play Again</button>
          <button className="btn btn-ghost btn-lg" onClick={() => dispatch({ type: 'RESET' })}>Change Players</button>
          <a className="btn btn-ghost btn-lg" href="index.html">All Games</a>
        </div>
      </div>
    </div>
  );
}

/* =========================================================================
   APP
   ========================================================================= */
function App() {
  const [state, dispatch] = useReducer(reducer, initial);
  useStageScale();

  let screen;
  switch (state.state) {
    case 'SETUP':   screen = <SetupScreen dispatch={dispatch} />; break;
    // key remounts the screen per question: fresh timer, fresh phases
    case 'QUIZ':    screen = <QuestionScreen key={state.qIndex} state={state} dispatch={dispatch} />; break;
    case 'RESULTS': screen = <ResultsScreen state={state} dispatch={dispatch} />; break;
    default:        screen = <div className="scene">Unknown state</div>;
  }

  return (
    <>
      {state.state !== 'SETUP' && <Sidebar state={state} />}
      <main className="main">{screen}</main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
